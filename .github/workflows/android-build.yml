name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Recreate Gradle Wrapper
        run: |
          echo "Regenerating gradle wrapper to prevent binary file corruption"
          gradle wrapper --gradle-version 9.3.1

      - name: Recreate Debug Keystore
        run: |
          echo "Recreating debug.keystore from debug.keystore.base64 if possible"
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully restored debug.keystore from base64!"
          else
            echo "debug.keystore.base64 not found, running keytool to generate a fresh debug.keystore"
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Successfully generated a fresh debug.keystore!"
          fi

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Commit and Push APK
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .build-outputs/app-debug.apk
          if git diff --staged --quiet; then
            echo "No change in APK detected."
          else
            git commit -m "chore: update built app-debug.apk [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: .build-outputs/app-debug.apk
